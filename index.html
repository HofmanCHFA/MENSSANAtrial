<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mens Sana - DASS-42 com Login</title>
    <style>
        /* (mesmo estilo de antes - mantive igual) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { color: #333; text-align: center; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        #loginSection { text-align: right; margin-bottom: 20px; }
        #userInfo { display: none; }
        button { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #5a67d8; }
        #dassForm { display: none; }
        .paciente-info { background: #e6f7ff; padding: 10px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid #1890ff; }
        .questao { margin-bottom: 25px; padding: 15px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #667eea; }
        .opcoes { display: flex; flex-wrap: wrap; gap: 10px; }
        .opcao { flex: 1; min-width: 120px; }
        .opcao label { display: flex; align-items: center; gap: 5px; background: white; padding: 8px 12px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; }
        .opcao input[type="radio"] { accent-color: #667eea; }
        #calcularBtn { display: block; width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin: 30px 0 20px; }
        .resultados { background: #f0f4ff; border-radius: 10px; padding: 20px; margin-top: 20px; border: 2px solid #667eea; }
        .cards { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
        .card-resultado { flex: 1; padding: 15px; background: white; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .escore { font-size: 2rem; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        th { background: #667eea; color: white; padding: 10px; text-align: left; }
        td { padding: 8px 10px; border-bottom: 1px solid #eee; }
        .aviso { margin-top: 20px; padding: 15px; background: #fff3cd; border: 1px solid #ffeeba; border-radius: 8px; color: #856404; }
        .aviso-legal { margin-top: 30px; font-size: 0.8rem; color: #999; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Mens Sana</h1>
    <div class="subtitle">Escala de Depressão, Ansiedade e Estresse (DASS-42)</div>

    <div id="loginSection">
        <div id="userInfo">
            <span id="userName"></span> |
            <button onclick="logout()">Sair</button>
        </div>
        <button id="loginBtn" onclick="loginGoogle()">Entrar com Google</button>
    </div>

    <form id="dassForm">
        <div class="paciente-info" id="pacienteSelecionadoInfo"></div>
        <div id="questoes-container"></div>
        <button type="button" id="calcularBtn" onclick="calcularDASS()">Ver Resultados</button>
    </form>

    <div id="resultados" style="display: none;"></div>

    <div class="aviso-legal">
        <p>⚠️ Ferramenta de triagem – não substitui avaliação profissional.</p>
    </div>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // Configuração do Firebase (SUA CONFIGURAÇÃO)
    const firebaseConfig = {
        apiKey: "AIzaSyDmXnNj2jOkpbYyG5M-7pBYweDQoaMhXyQ",
        authDomain: "mens-sana-dass42.firebaseapp.com",
        projectId: "mens-sana-dass42",
        storageBucket: "mens-sana-dass42.firebasestorage.app",
        messagingSenderId: "266383627883",
        appId: "1:266383627883:web:7806c236726d29b0a8032e",
        measurementId: "G-47TV45BSRW"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Lista de questões e lógica do DASS-42 (mesmo código de antes)
    const questoes = [
        "1. Tive dificuldade em me acalmar",
        "2. Senti minha boca seca",
        "3. Não consegui experimentar nenhum sentimento positivo",
        "4. Tive dificuldade em respirar (ex: respiração muito rápida, falta de ar sem esforço físico)",
        "5. Tive dificuldade em ter iniciativa para fazer as coisas",
        "6. Tive tendência a reagir exageradamente às situações",
        "7. Senti tremores (ex: nas mãos)",
        "8. Senti que estava nervoso",
        "9. Preocupei-me com situações em que poderia entrar em pânico e fazer papel de bobo",
        "10. Senti que não tinha nada a esperar do futuro",
        "11. Senti-me agitado",
        "12. Senti dificuldade em relaxar",
        "13. Senti-me desanimado e melancólico",
        "14. Senti intolerância com qualquer coisa que me impedisse de continuar o que estava fazendo",
        "15. Senti que ia entrar em pânico",
        "16. Não fui capaz de me entusiasmar com nada",
        "17. Senti que não valia muito como pessoa",
        "18. Senti que estava muito sensível",
        "19. Senti o coração bater forte sem ter feito esforço físico",
        "20. Senti medo sem razão",
        "21. Senti que a vida não tinha sentido",
        "22. Senti dificuldade para descansar",
        "23. Tive dificuldade em engolir",
        "24. Senti que não conseguia ter prazer com as coisas que fiz",
        "25. Senti alterações no meu corpo (ex: sudorese) sem esforço físico",
        "26. Senti-me triste e deprimido",
        "27. Senti que estava muito inquieto",
        "28. Senti que estava prestes a entrar em pânico",
        "29. Senti dificuldade em me acalmar após me aborrecer",
        "30. Tive medo de ficar 'bloqueado' em lugares cheios",
        "31. Senti que não tinha vontade de fazer nada",
        "32. Senti-me irritável",
        "33. Senti tensão muscular",
        "34. Senti que era indigno",
        "35. Não suportei ser interrompido quando estava ocupado",
        "36. Senti que ia desmaiar",
        "37. Senti-me amedrontado",
        "38. Senti que a vida não valia a pena",
        "39. Senti-me facilmente contrariado",
        "40. Senti o coração falhando (mesmo sem esforço)",
        "41. Senti-me assustado sem motivo",
        "42. Senti que era difícil continuar"
    ];

    const escalasPrincipais = {
        depressao: [2,4,9,12,15,16,20,23,25,30,33,36,37,41],
        ansiedade: [1,3,6,8,14,18,19,22,24,27,29,35,39,40],
        estresse:  [0,5,7,10,11,13,17,21,26,28,31,32,34,38]
    };

    const classificacao = {
        depressao: [ {max:9, label:'Normal'}, {min:10,max:13,label:'Leve'}, {min:14,max:20,label:'Moderado'}, {min:21,max:27,label:'Severo'}, {min:28,label:'Extremamente Severo'} ],
        ansiedade: [ {max:7, label:'Normal'}, {min:8,max:9,label:'Leve'}, {min:10,max:14,label:'Moderado'}, {min:15,max:19,label:'Severo'}, {min:20,label:'Extremamente Severo'} ],
        estresse:  [ {max:14,label:'Normal'}, {min:15,max:18,label:'Leve'}, {min:19,max:25,label:'Moderado'}, {min:26,max:33,label:'Severo'}, {min:34,label:'Extremamente Severo'} ]
    };

    // Subescalas (aproximadas)
    const subescalas = {
        depressao: {
            disforia: [12,15,25,30], desesperanca: [9,20,37], desvalorizacao: [2,4,33], autodepreciacao: [16,36,41], faltaInteresse: [23,40]
        },
        ansiedade: {
            excitacaoAutonomica: [1,3,6,8,14,18,19,22,24,27,29,35,39,40], muscular: [6], situacional: [8,27,29], subjetiva: [14,18,19,35,39,40]
        },
        estresse: {
            dificuldadeRelaxar: [11,21,26,28,31,32], agitado: [5,7,10,13,17,34,38], irritavel: [0,12,17,31,34,38]
        }
    };

    window.onload = function() {
        const container = document.getElementById('questoes-container');
        questoes.forEach((q, idx) => {
            let div = `<div class="questao"><p>${q}</p><div class="opcoes">`;
            for (let v=0; v<=3; v++) {
                let texto = ['0 - Não se aplicou','1 - Em algum grau','2 - Consideravelmente','3 - Muitíssimo'][v];
                div += `<div class="opcao"><label><input type="radio" name="q${idx}" value="${v}" required> ${texto}</label></div>`;
            }
            div += '</div></div>';
            container.innerHTML += div;
        });
    };

    function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => alert('Erro: '+e.message));
    }
    function logout() { auth.signOut().then(() => window.location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userName').textContent = user.displayName || user.email;
            document.getElementById('dassForm').style.display = 'block';
        } else {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('dassForm').style.display = 'none';
            document.getElementById('resultados').style.display = 'none';
        }
    });

    function classificarEscore(escore, tipo) {
        for (let r of classificacao[tipo]) {
            if (r.min===undefined && escore<=r.max) return r.label;
            if (r.min!==undefined && r.max!==undefined && escore>=r.min && escore<=r.max) return r.label;
            if (r.min!==undefined && r.max===undefined && escore>=r.min) return r.label;
        }
        return '?';
    }

    function calcularSubescalas(respostas) {
        let res = {};
        for (let esc in subescalas) {
            res[esc] = {};
            for (let sub in subescalas[esc]) {
                let itens = subescalas[esc][sub];
                let bruto = itens.reduce((acc,i)=>acc+respostas[i],0);
                let norm = (bruto / (itens.length*3))*10;
                res[esc][sub] = { bruto, normalizado: norm.toFixed(1) };
            }
        }
        return res;
    }

    function calcularDASS() {
        let respostas = [];
        for (let i=0; i<42; i++) {
            let radios = document.getElementsByName(`q${i}`);
            let val = null;
            for (let r of radios) if (r.checked) { val = parseInt(r.value); break; }
            if (val===null) { alert(`Responda a questão ${i+1}`); return; }
            respostas.push(val);
        }

        let dep=0, ans=0, est=0;
        escalasPrincipais.depressao.forEach(i=>dep+=respostas[i]);
        escalasPrincipais.ansiedade.forEach(i=>ans+=respostas[i]);
        escalasPrincipais.estresse.forEach(i=>est+=respostas[i]);

        let classDep = classificarEscore(dep,'depressao');
        let classAns = classificarEscore(ans,'ansiedade');
        let classEst = classificarEscore(est,'estresse');

        let subs = calcularSubescalas(respostas);

        let htmlSub = '';
        for (let esc in subs) {
            htmlSub += `<h3>${esc.charAt(0).toUpperCase()+esc.slice(1)}</h3><table><tr><th>Subescala</th><th>Bruto</th><th>Norm (0-10)</th></tr>`;
            for (let sub in subs[esc]) {
                let nome = sub.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase());
                htmlSub += `<tr><td>${nome}</td><td>${subs[esc][sub].bruto}</td><td>${subs[esc][sub].normalizado}</td></tr>`;
            }
            htmlSub += '</table>';
        }

        document.getElementById('resultados').style.display = 'block';
        document.getElementById('resultados').innerHTML = `
            <div class="resultados">
                <h2>Resultados</h2>
                <div class="cards">
                    <div class="card-resultado"><h3>Depressão</h3><div class="escore">${dep}</div><div>${classDep}</div></div>
                    <div class="card-resultado"><h3>Ansiedade</h3><div class="escore">${ans}</div><div>${classAns}</div></div>
                    <div class="card-resultado"><h3>Estresse</h3><div class="escore">${est}</div><div>${classEst}</div></div>
                </div>
                <h3>Subescalas</h3>${htmlSub}
                <div class="aviso">⚠️ Apenas triagem – consulte um profissional.</div>
            </div>
        `;
        document.getElementById('resultados').scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
